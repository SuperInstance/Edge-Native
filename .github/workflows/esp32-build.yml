name: ESP32 Build

on:
  push:
    paths:
      - 'firmware/**'
      - 'shared/**'
      - 'CMakeLists.txt'
  pull_request:
    paths:
      - 'firmware/**'
      - 'shared/**'
      - 'CMakeLists.txt'

jobs:
  build-firmware:
    name: ESP32-S3 Firmware Build
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.3
    steps:
      - uses: actions/checkout@v4

      - name: Build firmware
        working-directory: firmware
        run: |
          . $IDF_PATH/export.sh
          idf.py set-target esp32s3
          idf.py build
        shell: bash

      - name: Check binary size
        working-directory: firmware
        run: |
          SIZE=$(stat -c%s build/nexus_firmware.bin 2>/dev/null || echo "0")
          echo "Binary size: $SIZE bytes"
          if [ "$SIZE" -gt 1048576 ]; then
            echo "ERROR: Binary exceeds 1MB limit"
            exit 1
          fi

      - name: Archive build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32-firmware
          path: |
            firmware/build/nexus_firmware.bin
            firmware/build/nexus_firmware.elf
          retention-days: 7

  lint-c:
    name: C Code Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          find firmware/ shared/ -name '*.c' -o -name '*.h' | \
            xargs clang-format --dry-run --Werror
